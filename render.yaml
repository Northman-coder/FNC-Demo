databases:
  - name: ecommerce-db
    databaseName: ecommerce
    user: ecommerce

services:
  - type: keyvalue
    name: ecommerce-redis
    # Internal-only access (recommended).
    ipAllowList: []

  - type: web
    name: ecommerce-web
    runtime: ruby
    buildCommand: bash bin/render-build.sh
    preDeployCommand: bash bin/render-preflight.sh && bundle exec rails db:prepare
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ecommerce-redis
          type: keyvalue
          property: connectionString

  - type: worker
    name: ecommerce-worker
    runtime: ruby
    buildCommand: bash bin/render-build.sh --skip-assets
    startCommand: bundle exec sidekiq -C config/sidekiq.yml
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ecommerce-redis
          type: keyvalue
          property: connectionString